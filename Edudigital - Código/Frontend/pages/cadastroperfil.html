<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <div class="app">
        <header>
            <h1>Cadastro</h1>
        </header>

        <main>
            <div class="card" id="cadastro-card">

                <form id="reg-form">

                    <input type="text" id="nome" name="nome" placeholder="Nome"><br><br>

                    <input type="email" id="email" name="email" placeholder="Email"><br><br>

                    <input type="password" id="senha" name="senha" placeholder="Senha"><br><br>

                    <button class="btn-primary" type="submit">
                        Cadastrar
                    </button>

                </form>

                <p id="mensagem"></p>

            </div>


            <div class="card" id="perfil-card" style="display:none;">

                <h2>Dados do Usuário</h2>

                <p><strong>Nome:</strong></p>
                <p id="perfil-nome"></p>

                <p><strong>Email:</strong></p>
                <p id="perfil-email"></p>

                <p><strong>Senha:</strong></p>
                <p id="perfil-senha"></p>

                <br>

                <button class="btn-primary" onclick="editarPerfil()">
                    Editar Perfil
                </button>

            </div>

        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../scripts/registro.js"></script>
</body>

</html>
