<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Perfil</title>

    <link rel="stylesheet" href="../styles/style.css">

</head>

<body>

    <div class="app">

        <header>
            <h1>Dados do Usuário</h1>
        </header>

        <main>

            <div class="card">

                <div class="card" id="perfil-card" >

                    <p><strong>Nome:</strong></p>
                    <p id="perfil-nome"></p><br/><br/>

                    <p><strong>Email:</strong></p>
                    <p id="perfil-email"></p><br/><br/>

                    <p><strong>Senha:</strong></p>
                    <p id="perfil-senha"></p><br/><br/>

                    <p id="mensagem"></p>

                    <button class="btn-primary" onclick="irPagamentos()">
                        Aulas
                    </button>

                    <button class="btn-primary" onclick="irEditarPerfil()">
                        Editar Perfil
                    </button>
                    
                    <button class="btn-secondary" onclick="sair()">Sair</button>
                    <button class="btn-secondary" id="deletar">Deletar perfil</button> 
                </div>

            </div>

        </main>

    </div>

    <script src="../js/app.js"></script>
    <script src="../scripts/perfil.js"></script>

</body>

</html>
