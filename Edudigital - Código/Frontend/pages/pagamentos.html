<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos</title>

    <link rel="stylesheet" href="../styles/style.css">

</head>

<body>

    <div class="app">

        <header>
            <h1>Pagamentos</h1>
        </header>

        <main>

            <div class="card">

                <h2>Escolha o tipo de pagamento</h2>

                <button class="btn-primary" onclick="abrirAula('pix')">
                    Pagar com PIX
                </button>

                <button class="btn-primary" onclick="abrirAula('boleto')">
                    Pagar Boleto
                </button>

                <button class="btn-primary" onclick="abrirAula('cartao')">
                    Pagar com Cartão
                </button>

                <br>

                <button class="btn-secondary" onclick="voltarLogin()">
                    Voltar
                </button>

            </div>

        </main>

    </div>

    <script src="../js/app.js"></script>

</body>

</html>
