<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Editar Perfil</title>

    <link rel="stylesheet" href="../styles/style.css">

</head>

<body>

    <div class="app">

        <header>
            <h1>Editar Cadastro</h1>
        </header>

        <main>

            <div class="card">

                <form id="editar-form">

                    <form id="reg-form">
                        <input type="text" id="nome" name="nome" placeholder="Nome"><br><br>
                        <input type="email" id="email" name="email" placeholder="Email"><br><br>
                        <input type="password" id="senha" name="senha" placeholder="Senha"><br><br>
                        <button class="btn-primary" type="submit">
                            Salvar
                        </button>
                    </form>
                
                    <p id="mensagem"></p>

                    <button class="btn-secondary" onclick="irPerfil()">Voltar</button>                    

                </form>

            </div>

        </main>

    </div>

    <script src="../js/app.js"></script>
    <script src="../scripts/editar_perfil.js"></script>

</body>

</html>
