<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <div class="app">
        <header>
            <h1>Cadastro</h1>
        </header>

        <main>
            <div class="card">

                <input type="text" id="nome" placeholder="Nome"><br><br>
                <input type="email" id="email" placeholder="Email"><br><br>
                <input type="tel" id="telefone" placeholder="Telefone"><br><br>

                <button class="btn-primary" onclick="cadastrarUsuario()">Cadastrar</button>

                <p id="mensagem"></p>

                <button class="btn-secondary" onclick="irInicio()">Voltar</button>

            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
</body>

</html>
