<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Meu App</title>
    <link rel="stylesheet" href="../styles/cadastro.css">
    <link rel="stylesheet" href="../styles/global.css">
</head>

<body>
    <div class="container">
        <div class="login-card">
            <h2>Criar Conta</h2>
            <p class="subtitle">Preencha os dados abaixo</p>

            <form id="cadastroForm">
                <div class="input-group">
                    <span class="icon">👤</span>
                    <input type="text" id="nome" placeholder="Nome Completo" required>
                </div>

                <div class="input-group">
                    <span class="icon">✉️</span>
                    <input type="email" id="email" placeholder="Seu melhor e-mail" required>
                </div>

                <div class="input-group">
                    <span class="icon">🔒</span>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="input-group">
                    <span class="icon">🛡️</span>
                    <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required>
                </div>

                <button type="submit" class="login-btn">CADASTRAR</button>

                <div class="footer-link">
                    <span>Já tem uma conta? <a href="index.html">Faça Login</a></span>
                </div>
            </form>
        </div>
    </div>
    <script src="js/cadastro.js"></script>
</body>

</html>
